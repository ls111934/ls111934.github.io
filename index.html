<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评论排名查询</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js">
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Sarasa Mono SC', 'Consolas', 'Monaco', monospace;
            background: #f6f8fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app {
            max-width: 860px;
            width: 100%;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            padding: 28px 32px 36px;
        }
        .search-area {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .search-area input {
            flex: 1;
            min-width: 180px;
            padding: 10px 16px;
            font-size: 15px;
            font-family: inherit;
            border: 1.5px solid #d0d7de;
            border-radius: 10px;
            background: #f9fafb;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            color: #1f2328;
        }
        .search-area input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            background: #ffffff;
        }
        .search-area input::placeholder {
            color: #8b949e;
            font-size: 14px;
        }
        .search-area button {
            padding: 10px 28px;
            font-size: 15px;
            font-family: inherit;
            font-weight: 500;
            border: none;
            border-radius: 10px;
            background: #3b82f6;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }
        .search-area button:hover {
            background: #2563eb;
        }
        .search-area button:active {
            transform: scale(0.96);
        }
        .search-area button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            margin-top: 16px;
            min-height: 26px;
            font-size: 14px;
            color: #57606a;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .status .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2.5px solid #e5e7eb;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            flex-shrink: 0;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .status .err {
            color: #dc2626;
        }
        .status .ok {
            color: #16a34a;
        }
        .result-area {
            margin-top: 20px;
            border-top: 1.5px solid #eaeef2;
            padding-top: 18px;
        }
        .result-area .empty {
            color: #8b949e;
            font-size: 14px;
            text-align: center;
            padding: 14px 0 6px;
        }
        .result-item {
            font-size: 15px;
            line-height: 1.7;
            padding: 6px 0;
            border-bottom: 1px dashed #eaeef2;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 4px 16px;
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .result-item .rank {
            font-weight: 600;
            color: #1f2328;
            min-width: 70px;
        }
        .result-item .uname {
            color: #1f2328;
            word-break: break-all;
        }
        .result-item .time {
            color: #6b7785;
            font-size: 13px;
            margin-left: auto;
            white-space: nowrap;
        }
        .result-item .highlight {
            background: #fef08a;
            padding: 0 2px;
            border-radius: 2px;
        }
        @media (max-width: 600px) {
            .app {
                padding: 18px 16px 24px;
            }
            .search-area input {
                min-width: 120px;
                font-size: 14px;
            }
            .search-area button {
                padding: 10px 18px;
                font-size: 14px;
            }
            .result-item {
                font-size: 14px;
                gap: 2px 12px;
            }
            .result-item .time {
                font-size: 12px;
                white-space: normal;
            }
        }
    </style>
</head>
<body>

    <div class="app">
        <div class="search-area">
            <input type="text" id="usernameInput" placeholder="输入你的 B站用户名（模糊查找）" autocomplete="off" spellcheck="false">
            <button id="searchBtn">查找排名</button>
        </div>
        <div class="status" id="statusArea">
            <span id="statusText">请输入用户名开始查找</span>
        </div>
        <div class="result-area" id="resultArea">
            <div class="empty" id="emptyHint">暂无结果</div>
            <div id="resultList"></div>
        </div>
    </div>

    <script>
        // ================================================================
        //  配置（包含您的 SESSDATA）
        // ================================================================
        const AID = "116951993026040";
        const TARGET = "917813917813917813917813917813";
        const PAGE_SIZE = 20;
        const REQUEST_DELAY = 500;          // 毫秒
        const SORT_TYPE = 0;
        const EXTRACT_REPLIES = true;
        const SESSDATA = "dd4aed05%2C1800095667%2Cfa941%2A71CjB-qa2xsrWYIVWwkmYcA6oq3i3TeqmOF3AW7zAQ9B182251429N0HabrDivlyfil4YSVllkdjRlQjZTS1Bud2dLX2dJUjJWN0IyejJ0TEJjYzZHODRlVm1kWjBLUjRTa0RWalU4dkIzZGRoMzFiVkdGSEVEdmpvT1ctRnYyUnNCRjdLVlNvdzlRIIEC";

        // ---------- 跨域代理 ----------
        const USE_PROXY = true;
        const PROXY_URL = 'https://api.allorigins.win/raw?url=';

        // ================================================================
        //  工具函数
        // ================================================================
        function normalizeTarget(s) {
            let t = s;
            while (t.length < 32) t += "917813";
            return t.slice(0, 32);
        }
        const FIXED_TARGET = normalizeTarget(TARGET);

        function commonPrefixLen(a, b) {
            let i = 0;
            const n = Math.min(a.length, b.length);
            while (i < n && a[i] === b[i]) i++;
            return i;
        }

        function formatTime(ts) {
            const d = new Date(ts * 1000);
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
        }

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        // ================================================================
        //  B站 API（通过代理 + 携带 SESSDATA）
        // ================================================================
        async function fetchCommentsPage(aid, page) {
            const url = "https://api.bilibili.com/x/v2/reply";
            const params = new URLSearchParams({
                oid: aid,
                type: "1",
                pn: String(page),
                sort: String(SORT_TYPE),
                ps: String(PAGE_SIZE),
            });
            const originalUrl = url + "?" + params.toString();
            const finalUrl = USE_PROXY ? PROXY_URL + encodeURIComponent(originalUrl) : originalUrl;

            // 构造请求头，携带 Cookie（SESSDATA）
            const headers = {
                "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
                "Referer": "https://www.bilibili.com",
                "Accept": "application/json, text/plain, */*",
                "Cookie": `SESSDATA=${SESSDATA}`,
            };

            const resp = await fetch(finalUrl, {
                method: "GET",
                headers: headers,
                credentials: "omit",   // 不自动发送其他 cookie
            });

            if (!resp.ok) {
                throw new Error(`HTTP ${resp.status} ${resp.statusText}`);
            }
            const data = await resp.json();
            if (data.code !== 0) {
                throw new Error(data.message || `API 错误 code=${data.code}`);
            }
            const pageInfo = data.data?.page || {};
            const total = pageInfo.total || 0;
            const replies = data.data?.replies || [];
            return { replies, total };
        }

        // ================================================================
        //  获取全部评论
        // ================================================================
        async function fetchAllComments(aid, onProgress) {
            const all = [];
            let page = 1;
            let totalPages = null;
            let hasMore = true;

            while (hasMore) {
                const { replies, total } = await fetchCommentsPage(aid, page);
                if (!replies || replies.length === 0) {
                    hasMore = false;
                    break;
                }

                for (const item of replies) {
                    const member = item.member;
                    if (!member) continue;
                    const uid = Number(member.mid);
                    if (!Number.isFinite(uid)) continue;
                    const uname = member.uname || "";
                    const ctime = item.ctime;
                    if (ctime != null) {
                        all.push({ uid, uname, ctime });
                    }

                    if (EXTRACT_REPLIES && item.replies) {
                        for (const sub of item.replies) {
                            const subMember = sub.member;
                            if (!subMember) continue;
                            const subUid = Number(subMember.mid);
                            if (!Number.isFinite(subUid)) continue;
                            all.push({ uid: subUid, uname: subMember.uname || "", ctime: sub.ctime });
                        }
                    }
                }

                if (totalPages === null && total > 0) {
                    totalPages = Math.ceil(total / PAGE_SIZE);
                }
                if (totalPages !== null && page >= totalPages) {
                    hasMore = false;
                } else {
                    page++;
                    if (onProgress) onProgress(all.length, totalPages || '?');
                    await sleep(REQUEST_DELAY);
                }
            }
            if (onProgress) onProgress(all.length, totalPages || '?', true);
            return all;
        }

        // ================================================================
        //  主搜索逻辑
        // ================================================================
        async function doSearch(username) {
            const input = username.trim();
            if (!input) {
                setStatus("请输入用户名", '');
                showResult([]);
                return;
            }

            const btn = document.getElementById('searchBtn');
            btn.disabled = true;

            try {
                setStatus('正在获取评论数据 ...', 'loading');
                let fetchedCount = 0;
                const raw = await fetchAllComments(AID, (count, total, done) => {
                    fetchedCount = count;
                    if (done) setStatus(`已获取 ${count} 条评论，正在计算排名 ...`, 'loading');
                    else setStatus(`正在获取评论 ... ${count} 条 (共约 ${total} 条)`, 'loading');
                });

                if (!raw || raw.length === 0) {
                    setStatus('该视频暂无评论', 'error');
                    showResult([]);
                    btn.disabled = false;
                    return;
                }

                // 按 UID 去重，保留最早评论
                const earliest = new Map();
                for (const item of raw) {
                    const existing = earliest.get(item.uid);
                    if (!existing || item.ctime < existing.ctime) {
                        earliest.set(item.uid, { uname: item.uname, ctime: item.ctime });
                    }
                }

                // 计算 MD5 和公共前缀
                const results = [];
                for (const [uid, info] of earliest) {
                    const md5Hex = CryptoJS.MD5(String(uid)).toString(CryptoJS.enc.Hex);
                    const common = commonPrefixLen(md5Hex, FIXED_TARGET);
                    results.push({ uid, uname: info.uname, ctime: info.ctime, md5: md5Hex, common });
                }

                // 排序
                results.sort((a, b) => {
                    if (a.common !== b.common) return b.common - a.common;
                    return a.ctime - b.ctime;
                });

                // 模糊匹配用户名
                const lowerInput = input.toLowerCase();
                const matched = results.filter(r => r.uname.toLowerCase().includes(lowerInput));

                if (matched.length === 0) {
                    setStatus(`未找到包含 "${input}" 的用户`, 'error');
                    showResult([]);
                    btn.disabled = false;
                    return;
                }

                // 构建显示结果（不包含 uid、md5）
                const display = matched.map(r => ({
                    rank: results.indexOf(r) + 1,
                    total: results.length,
                    uname: r.uname,
                    ctime: r.ctime,
                    highlight: input,
                }));

                setStatus(`找到 ${matched.length} 位匹配用户，排名如下`, 'ok');
                showResult(display);

            } catch (err) {
                console.error(err);
                setStatus(`出错：${err.message || '未知错误'}`, 'error');
                showResult([]);
            } finally {
                btn.disabled = false;
            }
        }

        // ================================================================
        //  UI 辅助
        // ================================================================
        const statusText = document.getElementById('statusText');
        const statusArea = document.getElementById('statusArea');
        const resultList = document.getElementById('resultList');
        const emptyHint = document.getElementById('emptyHint');

        function setStatus(msg, type) {
            const spinner = statusArea.querySelector('.spinner');
            if (spinner) spinner.remove();
            statusText.className = '';
            if (type === 'loading') {
                const sp = document.createElement('span');
                sp.className = 'spinner';
                statusArea.prepend(sp);
                statusText.textContent = msg;
            } else if (type === 'error') {
                statusText.textContent = '⚠ ' + msg;
                statusText.className = 'err';
            } else if (type === 'ok') {
                statusText.textContent = '✓ ' + msg;
                statusText.className = 'ok';
            } else {
                statusText.textContent = msg;
            }
        }

        function showResult(items) {
            resultList.innerHTML = '';
            if (!items || items.length === 0) {
                emptyHint.style.display = 'block';
                return;
            }
            emptyHint.style.display = 'none';

            for (const item of items) {
                const div = document.createElement('div');
                div.className = 'result-item';

                const rankSpan = document.createElement('span');
                rankSpan.className = 'rank';
                rankSpan.textContent = `#${item.rank} / ${item.total}`;

                const unameSpan = document.createElement('span');
                unameSpan.className = 'uname';
                const raw = item.uname;
                const hl = item.highlight || '';
                if (hl && raw.toLowerCase().includes(hl.toLowerCase())) {
                    const idx = raw.toLowerCase().indexOf(hl.toLowerCase());
                    unameSpan.innerHTML = raw.slice(0, idx) + '<span class="highlight">' + raw.slice(idx, idx + hl.length) + '</span>' + raw.slice(idx + hl.length);
                } else {
                    unameSpan.textContent = raw;
                }

                const timeSpan = document.createElement('span');
                timeSpan.className = 'time';
                timeSpan.textContent = formatTime(item.ctime);

                div.appendChild(rankSpan);
                div.appendChild(unameSpan);
                div.appendChild(timeSpan);
                resultList.appendChild(div);
            }
        }

        // ================================================================
        //  事件绑定
        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            const input = document.getElementById('usernameInput');
            const btn = document.getElementById('searchBtn');

            function handleSearch() { doSearch(input.value); }

            btn.addEventListener('click', handleSearch);
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { e.preventDefault(); handleSearch(); }
            });
            input.focus();
            setStatus('请输入用户名开始查找', '');
            showResult([]);
        });
    </script>

</body>
</html>
